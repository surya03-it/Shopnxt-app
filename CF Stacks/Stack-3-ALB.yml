AWSTemplateFormatVersion: "2010-09-09"
Description: >
  ShopNxt | Stack 3 - Application Load Balancer (port 5000)
  Region  : eu-west-1
  Owner   : Surya
  GitHub  : https://github.com/surya03-it/Shopnxt-app

# ?? Parameters ?????????????????????????????????????????????????????????????????
Parameters:
  AppName:
    Type: String
    Default: shopnxt
    Description: Application name prefix

  Environment:
    Type: String
    Default: production
    AllowedValues: [production, staging, development]

  ContainerPort:
    Type: Number
    Default: 5000
    Description: Port the Flask app runs on inside the container

Resources:

  # ????????????????????????????????????????????????????????????????????????????
  # Application Load Balancer
  # Lives in public subnets (from Stack 1)
  # Security: drop invalid headers, idle timeout 30s
  # ????????????????????????????????????????????????????????????????????????????
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${AppName}-alb"
      Type: application
      Scheme: internet-facing
      IpAddressType: ipv4
      Subnets:
        - !ImportValue
          Fn::Sub: "${AppName}-public-subnet-1"
        - !ImportValue
          Fn::Sub: "${AppName}-public-subnet-2"
      SecurityGroups:
        - !ImportValue
          Fn::Sub: "${AppName}-alb-sg-id"
      LoadBalancerAttributes:
        - Key: routing.http.drop_invalid_header_fields.enabled
          Value: "true"
        - Key: idle_timeout.timeout_seconds
          Value: "30"
        - Key: access_logs.s3.enabled
          Value: "false"
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-alb"
        - Key: Owner
          Value: Surya
        - Key: Project
          Value: ShopNxt
        - Key: Environment
          Value: !Ref Environment
        - Key: Stack
          Value: stack-3-alb

  # ????????????????????????????????????????????????????????????????????????????
  # Target Group ? points to ECS tasks on port 5000
  # ????????????????????????????????????????????????????????????????????????????
  ALBTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${AppName}-tg"
      Port: !Ref ContainerPort
      Protocol: HTTP
      TargetType: ip
      VpcId: !ImportValue
        Fn::Sub: "${AppName}-vpc-id"
      HealthCheckEnabled: true
      HealthCheckPath: /health
      HealthCheckProtocol: HTTP
      HealthCheckPort: !Sub "${ContainerPort}"
      HealthCheckIntervalSeconds: 30
      HealthCheckTimeoutSeconds: 10
      HealthyThresholdCount: 2
      UnhealthyThresholdCount: 3
      Matcher:
        HttpCode: "200"
      TargetGroupAttributes:
        - Key: deregistration_delay.timeout_seconds
          Value: "30"
        - Key: stickiness.enabled
          Value: "false"
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-target-group"
        - Key: Owner
          Value: Surya
        - Key: Project
          Value: ShopNxt
        - Key: Environment
          Value: !Ref Environment
        - Key: ManagedBy
          Value: CloudFormation
        - Key: Stack
          Value: stack-3-alb

  # ????????????????????????????????????????????????????????????????????????????
  # ALB Listener ? port 80 forwards to Target Group on port 5000
  # ????????????????????????????????????????????????????????????????????????????
  ALBListenerHTTP:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref ALBTargetGroup

  # ????????????????????????????????????????????????????????????????????????????
  # CloudWatch Alarm ? alert if ALB has unhealthy targets
  # ????????????????????????????????????????????????????????????????????????????
  SNSTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${AppName}-alb-alerts"
      Subscription:
        - Protocol: email
          Endpoint: samsurya899@gmail.com
      Tags:
        - Key: Name
          Value: !Sub "${AppName}-alb-alerts"
        - Key: Owner
          Value: Surya
        - Key: Project
          Value: ShopNxt
        - Key: ManagedBy
          Value: CloudFormation

  ALBUnhealthyHostAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AppName}-unhealthy-hosts"
      AlarmDescription: "ShopNxt ALB has unhealthy targets ? Owner: Surya"
      Namespace: AWS/ApplicationELB
      MetricName: UnHealthyHostCount
      Dimensions:
        - Name: LoadBalancer
          Value: !GetAtt ALB.LoadBalancerFullName
        - Name: TargetGroup
          Value: !GetAtt ALBTargetGroup.TargetGroupFullName
      Statistic: Maximum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      AlarmActions:
        - !Ref SNSTopic
      OKActions:
        - !Ref SNSTopic
      TreatMissingData: notBreaching

  # ????????????????????????????????????????????????????????????????????????????
  # ? SSM Parameter ? ALB DNS-? store ????? (CloudFront stack cross-region fetch ???????)
  # Stack-6-CloudFront (us-east-1) ??? automatically ?????????????
  # ????????????????????????????????????????????????????????????????????????????
  ALBDnsSSMParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/shopnxt/${AppName}-alb-dns"
      Type: String
      Value: !GetAtt ALB.DNSName
      Description: ShopNxt ALB DNS ? used by CloudFront stack (us-east-1)
      Tags:
        Name: !Sub "${AppName}-alb-dns-ssm"
        Owner: Surya
        Project: ShopNxt
        ManagedBy: CloudFormation

# ?? Outputs (used by Stack 4 ECS) ?????????????????????????????????????????????
Outputs:

  ALBArn:
    Description: ALB ARN
    Value: !Ref ALB
    Export:
      Name: !Sub "${AppName}-alb-arn"

  ALBDNSName:
    Description: ALB DNS Name ? use this to access ShopNxt
    Value: !GetAtt ALB.DNSName
    Export:
      Name: !Sub "${AppName}-alb-dns"

  ALBHostedZoneId:
    Description: ALB Hosted Zone ID (for Route53 alias record)
    Value: !GetAtt ALB.CanonicalHostedZoneID
    Export:
      Name: !Sub "${AppName}-alb-hosted-zone-id"

  ALBTargetGroupArn:
    Description: Target Group ARN
    Value: !Ref ALBTargetGroup
    Export:
      Name: !Sub "${AppName}-tg-arn"

  ALBTargetGroupName:
    Description: Target Group Name
    Value: !GetAtt ALBTargetGroup.TargetGroupName
    Export:
      Name: !Sub "${AppName}-tg-name"

  ALBListenerArn:
    Description: ALB HTTP Listener ARN
    Value: !Ref ALBListenerHTTP
    Export:
      Name: !Sub "${AppName}-alb-listener-arn"

  ALBDnsSSMParameterName:
    Description: SSM Parameter name storing ALB DNS (for CloudFront stack reference)
    Value: !Sub "/shopnxt/${AppName}-alb-dns"
    Export:
      Name: !Sub "${AppName}-alb-dns-ssm-name"

  AppURL:
    Description: ShopNxt Application URL
    Value: !Sub "http://${ALB.DNSName}"